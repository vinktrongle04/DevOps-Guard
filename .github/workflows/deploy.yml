# ============================================================
# DevOps-Guard CI/CD Pipeline
# Runs all Quality Gates on every push/PR to main.
# Deploy step is intentionally omitted for the demo project —
# the focus is demonstrating Gate 1-3 in CI, not production deploy.
# ============================================================

name: DevOps-Guard CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ─── QUALITY GATES ──────────────────────────────────────────
  quality-gates:
    name: Quality Gates (Gate 1-3)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Gate 1 & Gate 2 — DevOps-Guard Action
        uses: ./
        with:
          command: all
        continue-on-error: true
        # NOTE: Demo project contains intentional security and dependency traps.
        # Real blocking happens at local pre-commit via Husky.
        # CI runs in advisory mode (continue-on-error) so the pipeline can complete.

      - name: Gate 3 — Lint (Code Quality)
        run: npm run lint
        continue-on-error: true

      - name: Build — Verify production bundle
        run: npm run build
